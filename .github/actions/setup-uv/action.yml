name: Install uv
description: >-
  Install uv at the version pinned in .github/.uv-version. The repository must
  already be checked out. This action pins the uv version for all the workflows.

inputs:
  cache-suffix:
    description: Suffix appended to the uv cache key.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Read pinned uv version
      id: pin
      shell: bash
      run: echo "version=$(cat "$GITHUB_WORKSPACE/.github/.uv-version")" >> "$GITHUB_OUTPUT"

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: ${{ steps.pin.outputs.version }}
        cache-suffix: ${{ inputs.cache-suffix }}
