# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

exclude: '^\.asv/results/.+\.json$'
default_stages: [pre-commit]
default_install_hook_types:
  [
    pre-commit,
    commit-msg,
    pre-merge-commit,
    post-commit,
    post-checkout,
    post-merge,
    post-rewrite,
  ]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-illegal-windows-names
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: forbid-submodules
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: name-tests-test
        args: [--pytest-test-first]
        exclude: tests/(util\.py|_.+\.py)$
      - id: trailing-whitespace
        exclude: '^renv/activate\.R$' # because renv edits it automatically, with trailing whitespace
      - id: no-commit-to-branch
  - repo: https://github.com/sbrunner/hooks
    rev: 1.7.0
    hooks:
      - id: copyright
      - id: copyright-required
        files: \.(py|rst)$
        # generated headerless file; untracked, so it only reaches hooks via
        # an explicit `pre-commit run --files`
        exclude: src/bartz/_version\.py$
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/DanielNoord/pydocstringformatter
    rev: v0.7.5
    hooks:
      - id: pydocstringformatter
        # config in [tool.pydocstringformatter] (pyproject.toml); the hook
        # already passes --write --quiet. Scoped to the library, whose numpy
        # attribute-docstring conventions this enforces; drop `files` to widen.
        files: ^src/bartz/.*\.py$
  - repo: https://github.com/jsh9/pydoclint
    rev: 0.8.4
    hooks:
      - id: pydoclint
  - repo: https://github.com/henryiii/validate-pyproject-schema-store
    rev: 2026.05.24
    hooks:
      - id: validate-pyproject
  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint # this is already defined to run in stage commit-msg
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.16
    hooks:
      - id: uv-lock
  - repo: local
    hooks:
      - id: lint-merged-tree
        name: full lint on the merged tree
        # Runs only at merge time (not on ordinary commits). Gates clean
        # auto-merges, whose merge commit git writes without invoking the
        # `pre-commit` stage: catches a merged tree that fails the hooks even
        # though each branch passed in isolation (e.g. a stale WORKAROUND or a
        # hook config changed on one side). `make lint` is `pre-commit run
        # --all-files`; nesting it here is safe (this hook is not in the
        # pre-commit stage, so --all-files does not re-trigger it).
        entry: make lint
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-merge-commit]
      - id: refresh-editable-version
        name: refresh the editable install's git-derived version
        # WORKAROUND(uv<99): uv's git cache-keys cannot detect new commits in
        # linked worktrees (see the cache-keys comment in pyproject.toml), so
        # the editable bartz's version goes stale; refresh it whenever HEAD
        # moves. If a uv release fixes worktree commit detection, set it as
        # the bound, and drop this hook once the CI-pinned uv reaches it.
        # `--inexact` avoids pruning extras (e.g. cuda), `--frozen` avoids
        # touching uv.lock mid-rebase, and the venv check skips worktrees
        # without an environment (e.g. right after `worktree add`);
        # UV_PROJECT_ENVIRONMENT is the only uv setting that moves the venv.
        entry: sh -c 'test ! -d "${UV_PROJECT_ENVIRONMENT:-.venv}" || uv sync --frozen --inexact --quiet --reinstall-package bartz'
        language: system
        pass_filenames: false
        always_run: true
        stages: [post-commit, post-checkout, post-merge, post-rewrite]
      - id: check-workarounds
        name: check stale WORKAROUND markers
        entry: uv run --dev python config/check_workarounds.py
        language: system
        pass_filenames: false
        always_run: true
      - id: ty
        name: ty check
        # there is no official ty pre-commit hook (and an isolated hook env
        # would not see the project venv anyway), so run the dev-pinned ty.
        # Whole-project check: per-file checking would miss cross-file breakage.
        # Vendor latest_bartz first, else its imports in benchmarks/ do not
        # resolve (e.g., on CI) or resolve against a stale copy.
        entry: >
          sh -c 'uv run --dev python benchmarks/_vendor_latest_bartz.py > /dev/null
          && uv run --dev ty check'
        language: system
        pass_filenames: false
        types_or: [python, toml]
      - id: check-returns-docstring
        name: forbid multi-line non-list `Returns` docstring sections
        # Matches a numpy-style `Returns` block whose first two non-blank lines
        # are both at the section's base indent: i.e., multi-line prose. List-
        # form (description on a more-indented continuation line) is skipped via
        # `(?P=i)\S`; the trailing lookahead skips the next section's header.
        language: pygrep
        entry: '^(?P<i>[ \t]*)Returns[ \t]*\n(?P=i)-+[ \t]*\n(?P=i)(?!""")\S[^\n]*\n(?:[ \t]*\n)*(?P=i)(?!""")(?!\w+[ \t]*\n(?P=i)-+[ \t]*$)\S'
        args: [--multiline]
        types: [python]
      - id: forbid-lam-lamda
        name: forbid `lam`/`lamda` identifier (use `lambda_` per PEP 8)
        language: pygrep
        entry: '\blam(da)?\b'
        types: [python]
      - id: forbid-jaxext-qualified-call
        name: forbid `_jaxext.foo(...)` (use `from bartz._jaxext import foo`)
        language: pygrep
        # lookbehind `(?<!\.)` allows module paths like `bartz._jaxext.foo`;
        # the trailing `\(` limits matches to function calls so docstrings that
        # mention `_jaxext.foo` are not flagged.
        entry: '(?<!\.)\b_jaxext\.\w+\s*\('
        types: [python]
      - id: forbid-jax-vmap-jit-qualified-call
        name: forbid qualified `jax.vmap`/`jax.jit` (use `from jax import vmap, jit`)
        language: pygrep
        # Matches the qualified name as a word (`\b`) so call sites (`jax.jit(`),
        # bare decorators (`@jax.jit`), and references (`partial(jax.jit, ...)`)
        # are all caught. The `(?!`)` negative lookahead skips docstring/comment
        # mentions, which are wrapped in backticks (`` `jax.jit` ``).
        entry: '\bjax\.(vmap|jit)\b(?!`)'
        types: [python]
      - id: forbid-jax-random-qualified-call
        name: forbid `jax.random.foo(...)` (use `from jax import random`)
        language: pygrep
        # the trailing `\(` limits matches to function calls so docstrings that
        # mention `jax.random` are not flagged.
        entry: '\bjax\.random\.\w+\s*\('
        types: [python]
      - id: forbid-mcmc-module-absolute-import
        name: forbid `from bartz import mcmcstep/loop (use `from bartz.mcmcstep import foo`)
        language: pygrep
        # Forbids `from bartz import ...mcmcstep|mcmcloop...` and `import
        # bartz.mcmcstep|mcmcloop`, which enable the `mcmcstep.foo`/`mcmcloop.foo`
        # qualified-access antipattern. `from bartz.mcmcstep import foo` (and
        # any submodule path like `bartz.mcmcstep._state`) is still allowed.
        # Excluded: `src/bartz/__init__.py` (legitimate submodule re-export
        # in the package's own init) and `benchmarks/` (deliberately probes
        # API surface across bartz versions via module-qualified access).
        exclude: '^(src/bartz/__init__\.py|benchmarks/)'
        entry: '^\s*(from\s+bartz\s+import\s+[^\n]*\b(mcmcstep|mcmcloop)\b|import\s+bartz\.(mcmcstep|mcmcloop)\b)'
        types: [python]
      - id: forbid-dunder-all
        name: forbid setting `__all__` in modules
        language: pygrep
        # matches any module-level `__all__` statement (plain/annotated/augmented
        # assignments, `.append`/`.extend`, `del`, etc.). The `^` anchor restricts
        # to column 0, so references inside indented code or docstrings are ignored.
        entry: '^__all__\b'
        types: [python]
